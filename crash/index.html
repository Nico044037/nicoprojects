const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let w, h;
const dots = [];
const numDots = 200; // Look CPU-intensive, but not too slow

function initCanvas() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    for(let i = 0; i < numDots; i++) {
        dots.push({ x: Math.random()*w, y: Math.random()*h, vy: 0.5 + Math.random()*1.5, size: 1+Math.random()*2 });
    }
}

function draw() {
    // Deliberately clearing the background is CPU costly, adding to the lag
    ctx.clearRect(0,0,w,h); 
    ctx.fillStyle = "rgba(100, 230, 255, 1)";
    dots.forEach(d => {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.size, 0, Math.PI*2);
        ctx.fill();
        d.y += d.vy;
        if(d.y > h) d.y = -d.size; // Reset position
    });
    // This looks intensive, but the memory usage here is low and stable.
    requestAnimationFrame(draw);
}

window.addEventListener('resize', initCanvas);
initCanvas();
draw();
