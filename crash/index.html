<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAM Simulator (Burst Mode)</title>
</head>
<body>

<h2>RAM Simulator (Burst Mode)</h2>
<p id="status">Starting...</p>
<button onclick="stop()">Stop</button>

<script>
let data = [];
let running = true;

// aggressive but safer limits
const chunkMB = 20;     // size per chunk
const burstCount = 10;  // how many chunks per cycle
const maxMB = 1000;     // cap (~1GB)
const delay = 10;

function stop() {
    running = false;
    data = [];
    document.getElementById("status").textContent = "Stopped & cleared";
}

function allocateBurst() {
    if (!running) return;

    let currentMB = data.length * chunkMB;

    if (currentMB >= maxMB) {
        stop();
        return;
    }

    // burst allocation (fast spike)
    for (let b = 0; b < burstCount; b++) {
        let chunk = new Uint8Array(1024 * 1024 * chunkMB);

        // force real allocation
        for (let i = 0; i < chunk.length; i += 4096) {
            chunk[i] = 1;
        }

        data.push(chunk);
    }

    let newMB = data.length * chunkMB;

    document.getElementById("status").textContent =
        "Allocated ~" + newMB + " MB";

    setTimeout(allocateBurst, delay);
}

// auto start
allocateBurst();
</script>

</body>
</html>
