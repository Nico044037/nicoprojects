<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAM Simulator</title>
<style>
body {
    font-family: Consolas, monospace;
    background: #0d0d0d;
    color: #00ff88;
    padding: 20px;
}
button {
    padding: 10px 15px;
    margin: 5px;
    background: #111;
    color: #00ff88;
    border: 1px solid #00ff88;
    cursor: pointer;
}
button:hover {
    background: #00ff88;
    color: #000;
}
#log {
    margin-top: 15px;
    white-space: pre-wrap;
}
</style>
</head>
<body>

<h2>RAM Usage Simulator (Controlled)</h2>
<p id="status">Idle</p>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<div id="log"></div>

<script>
let data = [];
let running = false;

// settings (safe defaults)
const chunkMB = 2;      // memory per step
const maxMB = 150;      // safety cap
const delay = 200;      // ms between allocations

function log(msg) {
    document.getElementById("log").textContent += msg + "\n";
}

function start() {
    if (running) return;
    running = true;
    log("Starting...");
    allocate();
}

function stop() {
    running = false;
    data = [];
    document.getElementById("status").textContent = "Stopped & memory cleared";
    log("Stopped. Memory cleared.");
}

function allocate() {
    if (!running) return;

    let currentMB = data.length * chunkMB;

    if (currentMB >= maxMB) {
        log("Reached limit (" + currentMB + " MB). Stopping safely.");
        stop();
        return;
    }

    // allocate memory chunk
    data.push(new Array(1024 * 1024 * chunkMB).fill("X"));

    let newMB = currentMB + chunkMB;
    document.getElementById("status").textContent =
        "Allocated ~" + newMB + " MB";

    log("Allocated: " + newMB + " MB");

    setTimeout(allocate, delay);
}
</script>

</body>
</html>
