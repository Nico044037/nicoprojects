<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAM Simulator (Real Allocation)</title>
</head>
<body>

<h2>RAM Simulator (More Real)</h2>
<p id="status">Starting...</p>
<button onclick="stop()">Stop</button>

<script>
let data = [];
let running = true;

// more aggressive
const chunkMB = 10;   // real MB per chunk
const maxMB = 500;    // still capped
const delay = 20;

function stop() {
    running = false;
    data = [];
    document.getElementById("status").textContent = "Stopped & cleared";
}

function allocate() {
    if (!running) return;

    let currentMB = data.length * chunkMB;

    if (currentMB >= maxMB) {
        stop();
        return;
    }

    // REAL allocation (this actually uses RAM)
    let chunk = new Uint8Array(1024 * 1024 * chunkMB);
    for (let i = 0; i < chunk.length; i += 4096) {
        chunk[i] = 1; // force memory commit
    }

    data.push(chunk);

    document.getElementById("status").textContent =
        "Allocated ~" + (currentMB + chunkMB) + " MB";

    setTimeout(allocate, delay);
}

allocate();
</script>

</body>
</html>
