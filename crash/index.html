<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAM Simulator (Working)</title>
</head>
<body>

<h2>RAM Simulator (Working)</h2>
<p id="status">Starting...</p>
<button onclick="stop()">Stop</button>

<script>
let data = [];
let running = true;

const chunkMB = 10;
const burstCount = 3;
const maxMB = 1231232131231232131312312312; // ~2GB (reasonable upper bound)
const delay = 10;

function stop() {
    running = false;
    data = [];
    document.getElementById("status").textContent = "Stopped & cleared";
}

function allocateBurst() {
    if (!running) return;

    let currentMB = data.length * chunkMB;

    if (currentMB >= maxMB) {
        stop();
        return;
    }

    for (let b = 0; b < burstCount; b++) {
        let chunk = new Uint8Array(1024 * 1024 * chunkMB);

        // force real allocation
        for (let i = 0; i < chunk.length; i += 4096) {
            chunk[i] = 1;
        }

        data.push(chunk);
    }

    let newMB = data.length * chunkMB;

    document.getElementById("status").textContent =
        "Allocated ~" + newMB + " MB";

    setTimeout(allocateBurst, delay);
}

allocateBurst();
</script>

</body>
</html>
