<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAM Simulator (Stable Fast)</title>
</head>
<body>

<h2>RAM Simulator (Stable Fast)</h2>
<p id="status">Starting...</p>
<button onclick="stop()">Stop</button>

<script>
let data = [];
let running = true;

// tuned settings (fast but not instant death)
const chunkMB = 8;      // smaller chunk
const burstCount = 4;   // fewer per burst
const maxMB = 1500;     // ~1.5GB cap
const delay = 30;       // tiny delay (important!)

function stop() {
    running = false;
    data = [];
    document.getElementById("status").textContent = "Stopped & cleared";
}

function allocateBurst() {
    if (!running) return;

    let currentMB = data.length * chunkMB;

    if (currentMB >= maxMB) {
        stop();
        return;
    }

    let newMB = data.length * chunkMB;

    document.getElementById("status").textContent =
        "Allocated ~" + newMB + " MB";

    setTimeout(allocateBurst, delay);
}

// auto start
allocateBurst();
</script>

</body>
</html>
