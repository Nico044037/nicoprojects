<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nico Connections</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #1a1a2e, #0a0a14);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            padding: 16px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #5865f2, #7b61ff);
            box-shadow: 0 0 15px rgba(123, 97, 255, 0.4);
            transition: all 0.25s ease;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 0 25px rgba(123, 97, 255, 0.7);
        }

        /* subtle glow behind content */
        .container::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(123,97,255,0.25), transparent);
            filter: blur(60px);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nico Connections</h1>

        <div class="links">
            <a class="btn" href="https://www.twitch.tv/nico100110382" target="_blank">Twitch</a>
            <a class="btn" href="https://youtube.com/@niconoocicon?si=JNAWPK-8cuJkkuG3" target="_blank">YouTube</a>
            <a class="btn" href="https://www.tiktok.com/@amazingcaredit2?_r=1&_t=ZN-95Pls1jhqnG" target="_blank">TikTok</a>
        </div>
    </div>

</body>
</html>
