<!DOCTYPE html>
<html>
<head>
  <title>Live Purchases</title>
</head>
<body style="background:#000; color:white; font-family:sans-serif;">

<h1>🛒 Live Purchases</h1>

<div id="purchase-banner" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  color: white;
  padding: 15px 20px;
  border-radius: 10px;
  display: none;
  font-size: 18px;
"></div>

<script>
let lastSeenTime = 0;

async function checkPurchase() {
  try {
    const res = await fetch("/api/webhook");
    const data = await res.json();

    if (!data || !data.time) return;

    if (data.time !== lastSeenTime) {
      lastSeenTime = data.time;

      const banner = document.getElementById("purchase-banner");
      banner.innerText = `🛒 ${data.item} bought (€${data.amount})`;
      banner.style.display = "block";

      setTimeout(() => {
        banner.style.display = "none";
      }, 4000);
    }

  } catch (err) {
    console.error(err);
  }
}

setInterval(checkPurchase, 3000);
</script>

</body>
</html>
