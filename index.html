<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniYT</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #1c1c1c;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-top: 10px;
      width: 200px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: red;
      color: white;
      cursor: pointer;
    }

    .channel {
      display: none;
    }

    .badge {
      color: #3ea6ff;
      margin-left: 8px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="container" id="loginBox">
  <h2>Login to MiniYT</h2>
  <input type="password" id="password" placeholder="Enter password">
  <br>
  <button onclick="login()">Login</button>
  <p id="error" style="color:red;"></p>
</div>

<div class="container channel" id="channelBox">
  <h1>MiniYT Channel <span class="badge">✔</span></h1>
  <p>Welcome to your channel!</p>
</div>

<script>
  function login() {
    const pass = document.getElementById("password").value;
    const error = document.getElementById("error");

    if (pass === "nico044037") {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("channelBox").style.display = "block";
    } else {
      error.textContent = "Wrong password!";
    }
  }
</script>

</body>
</html>
