<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniYT</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.container {
  max-width: 500px;
  margin: 60px auto;
  text-align: center;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 12px;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 80%;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  background: red;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.hidden { display: none; }

.video {
  background: #222;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

.badge {
  color: #3ea6ff;
}
</style>
</head>
<body>

<div class="container" id="auth">
  <h2>MiniYT</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="authMsg"></p>
</div>

<div class="container hidden" id="app">
  <h2 id="welcome"></h2>
  <p>Your Channel <span class="badge">✔</span></p>

  <h3>Upload Video</h3>
  <input id="videoTitle" placeholder="Video title">
  <input id="videoURL" placeholder="Video URL (YouTube embed or file link)">
  <button onclick="uploadVideo()">Upload</button>

  <h3>Videos</h3>
  <div id="videos"></div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = null;

function save() {
  localStorage.setItem("users", JSON.stringify(users));
}

function register() {
  const u = username.value;
  const p = password.value;

  if (!u || !p) {
    authMsg.textContent = "Fill everything";
    return;
  }

  if (users[u]) {
    authMsg.textContent = "User exists";
    return;
  }

  users[u] = { password: p, videos: [] };
  save();
  authMsg.textContent = "Registered! Now login.";
}

function login() {
  const u = username.value;
  const p = password.value;

  if (users[u] && users[u].password === p) {
    currentUser = u;
    showApp();
  } else {
    authMsg.textContent = "Wrong login";
  }
}

function showApp() {
  auth.classList.add("hidden");
  app.classList.remove("hidden");
  welcome.textContent = "Welcome " + currentUser;
  renderVideos();
}

function uploadVideo() {
  const title = videoTitle.value;
  const url = videoURL.value;

  if (!title || !url) return;

  users[currentUser].videos.push({ title, url });
  save();
  renderVideos();
}

function renderVideos() {
  videos.innerHTML = "";

  users[currentUser].videos.forEach(v => {
    const div = document.createElement("div");
    div.className = "video";
    div.innerHTML = `
      <h4>${v.title}</h4>
      <iframe width="100%" height="200" src="${v.url}" frameborder="0" allowfullscreen></iframe>
    `;
    videos.appendChild(div);
  });
}
</script>

</body>
</html>
