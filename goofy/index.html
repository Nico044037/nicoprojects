<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>100 Goofy Sound Buttons</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 10px;
    padding: 20px;
  }
  button {
    padding: 15px;
    font-size: 12px;
    background: #ff00aa;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button:hover {
    background: #ff66cc;
  }
</style>
</head>
<body>

<h1>🎺 100 Goofy Ahh Sound Buttons 🎺</h1>

<div class="grid" id="buttons"></div>

<script>
const sounds = [
  "https://www.myinstants.com/media/sounds/vine-boom.mp3",
  "https://www.myinstants.com/media/sounds/goofy-ahh-car-horn.mp3",
  "https://www.myinstants.com/media/sounds/cartoon-boing.mp3",
  "https://www.myinstants.com/media/sounds/bruh.mp3",
  "https://www.myinstants.com/media/sounds/windows-error.mp3"
];

function playRandomSound() {
  const sound = sounds[Math.floor(Math.random() * sounds.length)];
  const audio = new Audio(sound);
  audio.play();
}

// generate 100 buttons
const container = document.getElementById("buttons");

for (let i = 1; i <= 100; i++) {
  const btn = document.createElement("button");
  btn.innerText = "Sound " + i;
  btn.onclick = playRandomSound;
  container.appendChild(btn);
}
</script>

</body>
</html>
